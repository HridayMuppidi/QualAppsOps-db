services:
  qualappsops-db:
    image: postgres:16-alpine
    container_name: QualAppsOps-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - qualappsops_pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - qualappsops-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: QualAppsOps-pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - qualappsops_pgadmin:/var/lib/pgadmin
    depends_on:
      qualappsops-db:
        condition: service_healthy
    networks:
      - qualappsops-network

volumes:
  qualappsops_pgdata:
    driver: local
  qualappsops_pgadmin:
    driver: local

networks:
  qualappsops-network:
    driver: bridge
